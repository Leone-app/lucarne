<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinéma — Régie</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --border: #2a2a2e;
    --accent: #e8c97a;
    --accent-dim: #9a8550;
    --text: #e2ddd5;
    --muted: #6b6760;
    --danger: #c0392b;
    --success: #27ae60;
    --running: #e8c97a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
    display: flex;
    align-items: baseline;
    gap: 20px;
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--accent);
  }

  header span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .status-bar {
    padding: 10px 40px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.idle { background: var(--muted); }
  .status-dot.running { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
  .status-dot.feature { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-label { color: var(--muted); }
  .status-value { color: var(--text); }

  .scheduler-status {
    margin-left: auto;
    color: var(--accent-dim);
  }

  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    height: calc(100vh - 105px);
  }

  .panel {
    padding: 32px 40px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }

  .panel:last-child { border-right: none; }

  .panel-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .section { margin-bottom: 32px; }

  .label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .path-display {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text);
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: border-color 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .path-display:hover { border-color: var(--accent-dim); }
  .path-display .path-icon { color: var(--muted); flex-shrink: 0; }
  .path-display .path-text { overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .path-display.empty .path-text { color: var(--muted); }

  .time-input {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 14px;
    font-size: 24px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    border-radius: 3px;
    width: 100%;
    text-align: center;
    letter-spacing: 0.1em;
    transition: border-color 0.2s;
    outline: none;
  }

  .time-input:focus { border-color: var(--accent); }
  .track-select {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 8px 12px;
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    border-radius: 3px;
    width: 100%;
    outline: none;
    cursor: pointer;
  }
  .track-select:focus { border-color: var(--accent); }

  .video-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 280px;
    overflow-y: auto;
  }

  .video-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 3px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }

  .video-item:hover { background: var(--surface); }
  .video-item.selected { background: var(--surface); border-color: var(--accent-dim); color: var(--accent); }

  .video-item .vi-icon { color: var(--muted); flex-shrink: 0; }
  .video-item .vi-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .empty-state {
    color: var(--muted);
    font-size: 12px;
    padding: 20px 0;
    text-align: center;
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 8px;
  }

  .btn {
    padding: 12px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--text);
    width: 100%;
  }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0e0f;
    font-weight: 500;
  }

  .btn-primary:hover { background: #f0d898; border-color: #f0d898; }

  .btn-danger {
    border-color: var(--danger);
    color: var(--danger);
  }

  .btn-danger:hover { background: var(--danger); color: white; }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .countdown {
    text-align: center;
    padding: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-top: 8px;
  }

  .countdown-time {
    font-size: 36px;
    color: var(--accent);
    letter-spacing: 0.05em;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  .countdown-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Browser modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 600px;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .modal-current {
    font-size: 11px;
    color: var(--accent-dim);
    margin-top: 4px;
    word-break: break-all;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
  }

  .modal-close:hover { color: var(--text); }

  .modal-body {
    overflow-y: auto;
    flex: 1;
    padding: 8px;
  }

  .browser-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.15s;
  }

  .browser-item:hover { background: var(--surface); }
  .browser-item.folder { color: var(--text); }
  .browser-item.video-file { color: var(--muted); }
  .browser-item.video-file:hover { color: var(--accent); }
  .browser-item .bi-icon { flex-shrink: 0; }
  .browser-item.up { color: var(--muted); border-bottom: 1px solid var(--border); margin-bottom: 8px; padding-bottom: 12px; }

  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-sm {
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    background: transparent;
    color: var(--text);
    transition: all 0.2s;
  }

  .btn-sm:hover { border-color: var(--accent-dim); color: var(--accent); }
  .btn-sm.confirm { background: var(--accent); border-color: var(--accent); color: #0e0e0f; }
  .btn-sm.confirm:hover { background: #f0d898; }
  .btn-sm:disabled { opacity: 0.3; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 3px;
    font-size: 12px;
    color: var(--text);
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.ok { border-color: var(--success); }
  .toast.err { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>

<header>
  <h1>Cinéma</h1>
  <span>Régie</span>
</header>

<div class="status-bar">
  <div class="status-dot idle" id="statusDot"></div>
  <span class="status-label">Statut —</span>
  <span class="status-value" id="statusText">En attente</span>
  <span class="scheduler-status" id="schedulerStatus"></span>
</div>

<main>
  <!-- LEFT: Config -->
  <div class="panel">
    <div class="panel-title">Configuration</div>

    <div class="section">
      <label class="label">Dossier de boucle</label>
      <div class="path-display empty" id="loopFolderDisplay" onclick="openBrowser('folder')">
        <span class="path-icon">📁</span>
        <span class="path-text" id="loopFolderText">Choisir un dossier…</span>
      </div>
    </div>

    <div class="section">
      <label class="label">Vidéos en boucle</label>
      <div class="video-list" id="loopVideoList">
        <div class="empty-state">Aucun dossier sélectionné</div>
      </div>
    </div>

    <div class="section">
      <label class="label">Film principal</label>
      <div class="path-display empty" id="featureFileDisplay" onclick="openBrowser('feature')">
        <span class="path-icon">🎬</span>
        <span class="path-text" id="featureFileText">Choisir un fichier…</span>
      </div>
    </div>

    <div id="audioTrackSection" class="section" style="display:none">
      <label class="label">Piste audio</label>
      <select id="audioTrackSelect" class="track-select" onchange="onAudioTrackChange(this.value)">
        <option value="-1">Piste par défaut</option>
      </select>
    </div>

    <div class="section">
      <label class="label">Heure de début du film</label>
      <input type="time" class="time-input" id="featureTime" placeholder="20:30">
    </div>
  </div>

  <!-- RIGHT: Controls -->
  <div class="panel">
    <div class="panel-title">Contrôles</div>

    <div class="section">
      <div id="countdown" class="countdown" style="display:none">
        <div class="countdown-time" id="countdownTime">--:--:--</div>
        <div class="countdown-label">avant le film</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="btnStart" onclick="startSession()">▶ Lancer la séance</button>
      <button class="btn btn-danger" id="btnStop" onclick="stopSession()" disabled>■ Arrêter</button>
    </div>

    <div class="section" style="margin-top: 32px;">
      <label class="label">Actions manuelles</label>
      <div class="actions">
        <button class="btn" id="btnLoopNow" onclick="sendCommand('play_loop')" disabled>↺ Relancer la boucle</button>
        <button class="btn" id="btnFeatureNow" onclick="sendCommand('play_feature')" disabled>▶ Lancer le film maintenant</button>
      </div>
    </div>

    <div class="section" style="margin-top: 32px;">
      <label class="label">Player</label>
      <a href="/player.html" target="_blank" style="text-decoration:none;">
        <button class="btn" style="text-align:center;">⬡ Ouvrir la fenêtre projecteur</button>
      </a>
    </div>
  </div>
</main>

<!-- Browser Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">Sélectionner</div>
        <div class="modal-current" id="modalCurrent"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-sm" onclick="closeModal()">Annuler</button>
      <button class="btn-sm confirm" id="modalConfirm" onclick="confirmBrowser()" disabled>Sélectionner ce dossier</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let config = {};
let ws;
let browserMode = 'folder'; // 'folder' or 'feature'
let browserCurrentDir = '';
let browserSelectedPath = '';
let countdownInterval = null;

// --- WebSocket ---
function connectWS() {
  ws = new WebSocket(`ws://${location.host}`);
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}

function handleMessage(msg) {
  if (msg.type === 'state' || msg.type === 'config_update') {
    config = msg.config;
    renderConfig();
  }
  if (msg.type === 'folder_update') {
    renderLoopVideos(msg.videos);
  }
}

// --- Render ---
function renderConfig() {
  // Loop folder
  const loopEl = document.getElementById('loopFolderDisplay');
  const loopText = document.getElementById('loopFolderText');
  if (config.loopFolder) {
    loopEl.classList.remove('empty');
    loopText.textContent = config.loopFolder;
  } else {
    loopEl.classList.add('empty');
    loopText.textContent = 'Choisir un dossier…';
  }

  // Feature file
  const featEl = document.getElementById('featureFileDisplay');
  const featText = document.getElementById('featureFileText');
  if (config.featureFile) {
    featEl.classList.remove('empty');
    featText.textContent = config.featureFile.split('/').pop();
  } else {
    featEl.classList.add('empty');
    featText.textContent = 'Choisir un fichier…';
  }

  // Audio tracks
  if (config.featureFile) fetchAudioTracks(config.featureFile);
  else document.getElementById('audioTrackSection').style.display = 'none';

  // Time
  if (config.featureTime) {
    document.getElementById('featureTime').value = config.featureTime;
  }

  // Status
  updateStatus(config.status || 'idle');

  // Fetch videos
  if (config.loopFolder) fetchVideos();
}

async function fetchVideos() {
  const res = await fetch('/api/config');
  const data = await res.json();
  renderLoopVideos(data.videos || []);
}

function renderLoopVideos(videos) {
  const list = document.getElementById('loopVideoList');
  if (!videos.length) {
    list.innerHTML = '<div class="empty-state">Aucune vidéo dans ce dossier</div>';
    return;
  }
  list.innerHTML = videos.map(v => `
    <div class="video-item">
      <span class="vi-icon">▷</span>
      <span class="vi-name" title="${v.name}">${v.name}</span>
    </div>
  `).join('');
}

function updateStatus(status) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const btnStart = document.getElementById('btnStart');
  const btnStop = document.getElementById('btnStop');
  const btnLoopNow = document.getElementById('btnLoopNow');
  const btnFeatureNow = document.getElementById('btnFeatureNow');

  dot.className = `status-dot ${status}`;

  if (status === 'idle') {
    text.textContent = 'En attente';
    btnStart.disabled = false;
    btnStop.disabled = true;
    btnLoopNow.disabled = true;
    btnFeatureNow.disabled = true;
    stopCountdown();
  } else if (status === 'running') {
    text.textContent = 'Boucle en cours';
    btnStart.disabled = true;
    btnStop.disabled = false;
    btnLoopNow.disabled = false;
    btnFeatureNow.disabled = false;
    startCountdown();
  } else if (status === 'feature') {
    text.textContent = 'Film en cours';
    btnStart.disabled = true;
    btnStop.disabled = false;
    btnLoopNow.disabled = false;
    btnFeatureNow.disabled = true;
    stopCountdown();
  }
}

function startCountdown() {
  const timeStr = document.getElementById('featureTime').value;
  if (!timeStr) { stopCountdown(); return; }

  document.getElementById('countdown').style.display = 'block';

  countdownInterval = setInterval(() => {
    const now = new Date();
    const [h, m] = timeStr.split(':').map(Number);
    const target = new Date(now);
    target.setHours(h, m, 0, 0);
    if (target <= now) target.setDate(target.getDate() + 1);

    const diff = target - now;
    const hh = Math.floor(diff / 3600000);
    const mm = Math.floor((diff % 3600000) / 60000);
    const ss = Math.floor((diff % 60000) / 1000);
    document.getElementById('countdownTime').textContent =
      `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  }, 1000);
}

function stopCountdown() {
  clearInterval(countdownInterval);
  document.getElementById('countdown').style.display = 'none';
}

// --- API calls ---
async function saveConfigField(field, value) {
  await fetch('/api/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ [field]: value })
  });
}

async function startSession() {
  // Save current time before starting
  const time = document.getElementById('featureTime').value;
  if (time) await saveConfigField('featureTime', time);

  const res = await fetch('/api/start', { method: 'POST' });
  const data = await res.json();
  if (!data.ok) return showToast(data.error, 'err');

  config.status = 'running';
  updateStatus('running');
  showToast('Séance lancée', 'ok');
}

async function stopSession() {
  await fetch('/api/stop', { method: 'POST' });
  config.status = 'idle';
  updateStatus('idle');
  showToast('Séance arrêtée');
}

async function sendCommand(type) {
  if (type === 'play_loop') {
    await fetch('/api/start', { method: 'POST' });
    config.status = 'running';
    updateStatus('running');
    showToast('Boucle relancée', 'ok');
  } else if (type === 'play_feature') {
    const res = await fetch('/api/play-feature-now', { method: 'POST' });
    const data = await res.json();
    if (!data.ok) return showToast(data.error, 'err');
    config.status = 'feature';
    updateStatus('feature');
    showToast('Film lancé', 'ok');
  }
}

// --- Browser modal ---
function openBrowser(mode) {
  browserMode = mode;
  browserSelectedPath = '';
  const confirmBtn = document.getElementById('modalConfirm');

  if (mode === 'folder') {
    document.getElementById('modalTitle').textContent = 'Sélectionner le dossier de boucle';
    confirmBtn.textContent = 'Sélectionner ce dossier';
    confirmBtn.disabled = true;
  } else {
    document.getElementById('modalTitle').textContent = 'Sélectionner le film';
    confirmBtn.textContent = 'Sélectionner ce fichier';
    confirmBtn.disabled = true;
  }

  document.getElementById('modalOverlay').classList.add('open');
  browseDir(config.loopFolder || '');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function browseDir(dir) {
  const res = await fetch('/api/browse', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ dir })
  });
  const data = await res.json();
  if (data.error) return;

  browserCurrentDir = data.current;
  document.getElementById('modalCurrent').textContent = data.current;

  const body = document.getElementById('modalBody');
  let html = '';

  // Up link
  if (data.parent && data.parent !== data.current) {
    html += `<div class="browser-item up" onclick="browseDir('${esc(data.parent)}')">
      <span class="bi-icon">↑</span> Dossier parent
    </div>`;
  }

  // Folders
  data.folders.forEach(f => {
    html += `<div class="browser-item folder" onclick="handleBrowserClick('folder', '${esc(f.path)}')">
      <span class="bi-icon">📁</span> ${esc(f.name)}
    </div>`;
  });

  // Videos (only in feature mode)
  if (browserMode === 'feature') {
    data.videos.forEach(v => {
      html += `<div class="browser-item video-file" onclick="handleBrowserClick('video', '${esc(v.path)}')">
        <span class="bi-icon">🎬</span> ${esc(v.name)}
      </div>`;
    });
  }

  if (!data.folders.length && (browserMode !== 'feature' || !data.videos.length)) {
    html += `<div class="empty-state" style="padding:20px">Dossier vide</div>`;
  }

  body.innerHTML = html;

  // In folder mode, current dir is selectable
  if (browserMode === 'folder') {
    browserSelectedPath = data.current;
    document.getElementById('modalConfirm').disabled = false;
  }
}

function handleBrowserClick(type, clickedPath) {
  if (type === 'folder') {
    if (browserMode === 'folder') {
      browseDir(clickedPath);
    } else {
      browseDir(clickedPath);
    }
  } else if (type === 'video') {
    // Select this file
    browserSelectedPath = clickedPath;
    document.getElementById('modalConfirm').disabled = false;
    // Highlight
    document.querySelectorAll('.browser-item').forEach(el => el.style.background = '');
    event.currentTarget.style.background = 'var(--surface)';
    event.currentTarget.style.color = 'var(--accent)';
  }
}

async function confirmBrowser() {
  if (!browserSelectedPath) return;

  if (browserMode === 'folder') {
    await saveConfigField('loopFolder', browserSelectedPath);
    config.loopFolder = browserSelectedPath;
    renderConfig();
    fetchVideos();
  } else {
    await saveConfigField('featureFile', browserSelectedPath);
    config.featureFile = browserSelectedPath;
    renderConfig();
  }

  closeModal();
  showToast('Enregistré', 'ok');
}

async function fetchAudioTracks(filePath) {
  try {
    const tracks = await fetch(`/api/audio-tracks?path=${encodeURIComponent(filePath)}`).then(r => r.json());
    renderAudioTracks(tracks);
  } catch {
    document.getElementById('audioTrackSection').style.display = 'none';
  }
}

function renderAudioTracks(tracks) {
  const section = document.getElementById('audioTrackSection');
  const select = document.getElementById('audioTrackSelect');
  if (!tracks || tracks.length <= 1) { section.style.display = 'none'; return; }
  const current = config.featureAudioTrack ?? -1;
  select.innerHTML = '<option value="-1">Piste par défaut</option>' +
    tracks.map(t => {
      const label = t.title || t.language || `Piste ${t.index + 1}`;
      const extra = [t.codec, t.language].filter(Boolean).join(' · ');
      return `<option value="${t.index}"${t.index === current ? ' selected' : ''}>${label}${extra ? ` (${extra})` : ''}</option>`;
    }).join('');
  section.style.display = 'block';
}

async function onAudioTrackChange(val) {
  const track = val === '-1' ? null : parseInt(val, 10);
  config.featureAudioTrack = track;
  await saveConfigField('featureAudioTrack', track);
}

function esc(str) {
  return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// Auto-save time on change
document.getElementById('featureTime').addEventListener('change', (e) => {
  saveConfigField('featureTime', e.target.value);
});

// --- Toast ---
function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast show ${type}`;
  setTimeout(() => toast.className = 'toast', 2500);
}

// --- Init ---
connectWS();
fetch('/api/config').then(r => r.json()).then(data => {
  config = data;
  renderConfig();
});
</script>
