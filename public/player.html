<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cinéma — Projecteur</title>
<link rel="stylesheet" href="/fonts/fonts.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Courier New', monospace;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #videoEl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
  }

  #idleScreen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    gap: 16px;
  }

  .idle-title {
    font-size: 14px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #333;
  }

  .idle-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #222;
    animation: breathe 3s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.5); }
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    z-index: 10;
  }

  #overlay.visible { opacity: 1; }

  #statusOverlay {
    position: absolute;
    bottom: 20px;
    right: 20px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #1a1a1a;
    z-index: 20;
    transition: color 0.5s;
  }

  #statusOverlay.visible { color: #444; }

  /* Click to fullscreen hint */
  #hint {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #333;
    cursor: pointer;
    z-index: 30;
    transition: opacity 0.3s;
  }

  #hint:hover { color: #666; }

  #welcomeStage {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 5;
    overflow: hidden;
  }

  .ws-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 80px;
  }

  .ws-brand {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(32px, 5vw, 80px);
    letter-spacing: 0.3em;
  }

  .ws-event {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: clamp(10px, 1.2vw, 14px);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    opacity: 0.55;
  }

  .ws-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(22px, 4vw, 56px);
    letter-spacing: 0.06em;
    text-align: center;
  }

  .ws-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: clamp(10px, 1.1vw, 14px);
    letter-spacing: 0.2em;
    opacity: 0.6;
    text-align: center;
  }

  .ws-clock {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: clamp(32px, 6vw, 80px);
    letter-spacing: 0.15em;
    margin-top: 8px;
  }

  .ws-date {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: clamp(9px, 0.9vw, 12px);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    opacity: 0.35;
  }

  .ws-logos {
    display: flex;
    gap: 28px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 16px;
  }

  .ws-logos > div {
    height: 44px;
    display: flex;
    align-items: center;
  }

  .ws-logos svg { height: 100%; width: auto; }
</style>
</head>
<body>

<div id="idleScreen">
  <div class="idle-title">Projecteur</div>
  <div class="idle-dot"></div>
</div>

<video id="videoEl" playsinline></video>

<div id="welcomeStage"></div>

<!-- Fade transition overlay -->
<div id="overlay"></div>

<div id="statusOverlay">En attente</div>
<div id="hint" onclick="toggleFullscreen()">Plein écran</div>

<script>
const video = document.getElementById('videoEl');
const idleScreen = document.getElementById('idleScreen');
const welcomeStage = document.getElementById('welcomeStage');
const overlay = document.getElementById('overlay');
const statusEl = document.getElementById('statusOverlay');
const hint = document.getElementById('hint');

let currentMode = 'idle'; // 'idle' | 'loop' | 'feature' | 'paused'
let loopItems = [];
let loopIndex = 0;
let featureFile = '';
let pendingAudioTrack = null;
let pendingDelay = 0;
let pendingSubtitleTrack = null;
let savedFeatureTime = 0;
let welcomeClockInterval = null;
let welcomeTimeout = null;

// --- WebSocket ---
let ws;

function connect() {
  ws = new WebSocket(`ws://${location.host}`);
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
  ws.onclose = () => setTimeout(connect, 2000);
}

function handleMessage(msg) {
  console.log('[Player]', msg.type, msg);

  switch (msg.type) {
    case 'state':
      if (msg.config.status === 'running' && msg.config.loopFolder) {
        fetchAndStartLoop();
      } else if ((msg.config.status === 'feature' || msg.config.status === 'paused') && msg.config.featureFile) {
        pendingAudioTrack = msg.config.featureAudioTrack ?? null;
        pendingSubtitleTrack = msg.config.featureSubtitleTrack ?? null;
        pendingDelay = msg.config.filmAudio?.delay ?? 0;
        startFeature(msg.config.featureFile);
      }
      break;

    case 'play_loop':
      loopItems = msg.items || [];
      loopIndex = 0;
      startLoop();
      break;

    case 'play_feature':
      featureFile = msg.file;
      pendingAudioTrack = msg.audioTrack ?? null;
      pendingSubtitleTrack = msg.subtitleTrack ?? null;
      pendingDelay = msg.delay ?? 0;
      startFeature(featureFile);
      break;

    case 'pause_feature':
      if (currentMode === 'feature') {
        savedFeatureTime = video.currentTime;
        currentMode = 'paused';
        video.pause();
        setStatus('Pause');
        fetch('/api/feature-paused', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ time: savedFeatureTime }),
        });
      }
      break;

    case 'resume_feature':
      if (currentMode === 'paused') {
        currentMode = 'feature';
        video.play().catch(e => console.warn('Play error:', e));
        setStatus(`Film — ${featureFile.split('/').pop()}`);
      }
      break;

    case 'stop':
      stopAll();
      break;
  }
}

// --- Loop ---
async function fetchAndStartLoop() {
  const res = await fetch('/api/config');
  const data = await res.json();
  const videos = data.videos || [];
  loopItems = buildLoopItems(videos, data);
  loopIndex = 0;
  if (loopItems.length) startLoop();
}

function buildLoopItems(videos, config) {
  const { welcomePageInterval, welcomePageDuration, welcomePage } = config;
  if (!welcomePageInterval) return videos.map(v => ({ type: 'video', ...v }));
  const items = [];
  const wp = { type: 'welcome_page', duration: welcomePageDuration, config: welcomePage };
  items.push(wp);
  videos.forEach((v, i) => {
    items.push({ type: 'video', ...v });
    if ((i + 1) % welcomePageInterval === 0) items.push(wp);
  });
  return items.length ? items : videos.map(v => ({ type: 'video', ...v }));
}

function startLoop() {
  if (!loopItems.length) {
    setStatus('Aucune vidéo en boucle');
    return;
  }
  currentMode = 'loop';
  playLoopItem(loopIndex);
}

function playLoopItem(index) {
  const item = loopItems[index];
  if (!item) return;

  fadeIn(() => {
    if (item.type === 'welcome_page') {
      clearWelcomeTimers();
      video.pause();
      video.style.display = 'none';
      idleScreen.style.display = 'none';
      showWelcomePage(item.config);
      setStatus("Page d'accueil");
      fadeOut();
      welcomeTimeout = setTimeout(() => {
        if (currentMode === 'loop') {
          loopIndex = (loopIndex + 1) % loopItems.length;
          playLoopItem(loopIndex);
        }
      }, item.duration * 1000);
    } else {
      hideWelcomePage();
      video.src = `/video?path=${encodeURIComponent(item.path)}`;
      video.play().catch(e => console.warn('Play error:', e));
      showVideo();
      setStatus(`Boucle — ${item.name}`);
      fadeOut();
    }
  });
}

video.addEventListener('ended', () => {
  if (currentMode === 'loop') { loopIndex = (loopIndex + 1) % loopItems.length; playLoopItem(loopIndex); }
  else if (currentMode === 'feature') { fetch('/api/feature-ended', { method: 'POST' }); }
});

// --- Subtitle track ---
function applySubtitleTrack(filePath) {
  Array.from(video.querySelectorAll('track')).forEach(t => t.remove());
  if (pendingSubtitleTrack === null) return;
  const trackEl = document.createElement('track');
  trackEl.kind = 'subtitles';
  trackEl.src = `/api/subtitles?path=${encodeURIComponent(filePath)}&track=${pendingSubtitleTrack}`;
  video.appendChild(trackEl);
  // 'default' attribute does not activate dynamically-added tracks — force mode explicitly
  trackEl.track.mode = 'showing';
  trackEl.addEventListener('load', () => { trackEl.track.mode = 'showing'; });
}

// --- Feature ---
function startFeature(filePath) {
  currentMode = 'feature';
  clearWelcomeTimers();
  fadeIn(() => {
    hideWelcomePage();
    const trackParam = pendingAudioTrack !== null ? `&audioTrack=${pendingAudioTrack}` : '';
    const delayParam = pendingDelay ? `&delay=${pendingDelay}` : '';
    video.src = `/video?path=${encodeURIComponent(filePath)}${trackParam}${delayParam}`;
    applySubtitleTrack(filePath);
    video.play().catch(e => console.warn('Play error:', e));
    showVideo();
    setStatus(`Film — ${filePath.split('/').pop()}`);
    fadeOut();
  });
}

// --- Stop ---
function stopAll() {
  currentMode = 'idle';
  clearWelcomeTimers();
  fadeIn(() => {
    video.pause();
    video.src = '';
    Array.from(video.querySelectorAll('track')).forEach(t => t.remove());
    hideVideo();
    hideWelcomePage();
    setStatus('En attente');
    fadeOut();
  });
}

// --- Welcome page ---
function showWelcomePage(cfg) {
  welcomeStage.style.display = 'block';
  welcomeStage.style.background = cfg.bg;
  renderStageContent(cfg);
}

function hideWelcomePage() {
  welcomeStage.style.display = 'none';
  clearWelcomeTimers();
}

function clearWelcomeTimers() {
  if (welcomeClockInterval) { clearInterval(welcomeClockInterval); welcomeClockInterval = null; }
  if (welcomeTimeout) { clearTimeout(welcomeTimeout); welcomeTimeout = null; }
}

function renderStageContent(cfg) {
  const fg = cfg.fg || '#ece6d5';
  const accent = cfg.accent || '#e8c878';

  const logosHtml = (cfg.logos || []).length
    ? `<div class="ws-logos">${cfg.logos.map(svg => `<div>${svg}</div>`).join('')}</div>`
    : '';

  welcomeStage.innerHTML = `
    <div class="ws-inner" style="color:${fg};">
      ${cfg.showBrand && cfg.brandText ? `<div class="ws-brand" style="color:${accent};">${cfg.brandText}</div>` : ''}
      ${cfg.eventName ? `<div class="ws-event">${cfg.eventName}</div>` : ''}
      ${cfg.title ? `<div class="ws-title">${cfg.title}</div>` : ''}
      ${cfg.subtitle ? `<div class="ws-subtitle">${cfg.subtitle}</div>` : ''}
      ${cfg.mode !== 'none' ? `<div class="ws-clock" id="wpClock" style="color:${accent};"></div>` : ''}
      ${logosHtml}
      ${cfg.showDate ? `<div class="ws-date" id="wpDate"></div>` : ''}
    </div>
  `;

  if (cfg.mode !== 'none') {
    const clockEl = document.getElementById('wpClock');
    const tick = () => {
      if (clockEl) clockEl.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    };
    tick();
    welcomeClockInterval = setInterval(tick, 1000);
  }

  if (cfg.showDate) {
    const dateEl = document.getElementById('wpDate');
    if (dateEl) {
      dateEl.textContent = new Date().toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
  }
}

// --- UI helpers ---
function showVideo() {
  video.style.display = 'block';
  idleScreen.style.display = 'none';
}

function hideVideo() {
  video.style.display = 'none';
  idleScreen.style.display = 'flex';
}

function setStatus(text) {
  statusEl.textContent = text;
  statusEl.classList.add('visible');
  clearTimeout(statusEl._timeout);
  statusEl._timeout = setTimeout(() => statusEl.classList.remove('visible'), 3000);
}

// Fade to black then back
function fadeIn(callback) {
  overlay.classList.add('visible');
  setTimeout(() => {
    callback();
  }, 400);
}

function fadeOut() {
  setTimeout(() => {
    overlay.classList.remove('visible');
  }, 200);
}

// --- Fullscreen ---
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    hint.style.opacity = '0';
    setTimeout(() => hint.style.display = 'none', 500);
  } else {
    document.exitFullscreen();
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'Escape' && document.fullscreenElement) document.exitFullscreen();
});

// Hide hint after 5s
setTimeout(() => {
  hint.style.opacity = '0';
  setTimeout(() => hint.style.display = 'none', 500);
}, 5000);

// --- Init ---
connect();
</script>
</body>
</html>
